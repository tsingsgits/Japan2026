<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Trip 2026 🗾</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#0d0d1a;color:#fff}

/* SLIDES */
.slide{position:fixed;inset:0;display:none;animation:fadeIn .35s ease}
.slide.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* COVER */
#slide-0{flex-direction:column;align-items:center;justify-content:center;background:#0d0d1a}
#cover-bg{position:absolute;inset:0;opacity:.12;z-index:0}
.cover-body{position:relative;z-index:1;text-align:center;padding:20px}
.cover-jp{font-family:'Noto Serif JP',serif;font-size:72px;font-weight:700;
  background:linear-gradient(135deg,#ffd700 0%,#ff6b9d 50%,#a855f7 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin-bottom:8px}
.cover-en{font-size:17px;letter-spacing:6px;opacity:.55;margin-bottom:20px;text-transform:uppercase}
.cover-dates{font-size:15px;letter-spacing:4px;opacity:.45;margin-bottom:32px}
.cover-route{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 4px;max-width:560px;font-size:13px;opacity:.7}
.rc{font-weight:600;color:#fff;opacity:1}.ra{opacity:.35}
.start-btn{margin-top:36px;padding:12px 36px;border-radius:30px;border:1.5px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.08);color:#fff;font-size:14px;font-weight:600;letter-spacing:2px;
  cursor:pointer;transition:.2s;backdrop-filter:blur(6px)}
.start-btn:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.5)}

/* DAY SLIDES — split layout */
.day-slide{width:100%;height:100%;display:flex}
.map-pane{flex:1;position:relative;min-width:0}
.map-pane .leaflet-container{width:100%;height:100%}
.info-pane{width:380px;flex-shrink:0;background:linear-gradient(160deg,#12122a 0%,#0e1e3a 60%,#0c1a32 100%);
  overflow-y:auto;display:flex;flex-direction:column;padding:24px 20px 80px}
.info-pane::-webkit-scrollbar{width:3px}
.info-pane::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}

/* Day header */
.dh-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.day-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.day-num{font-size:12px;opacity:.45;font-weight:500;letter-spacing:1px}
.dh-date{font-size:21px;font-weight:700;line-height:1.2;margin-bottom:3px}
.dh-loc{font-size:13px;opacity:.6;margin-bottom:18px;display:flex;align-items:center;gap:5px}

/* Cards */
.card{background:rgba(255,255,255,.06);border-radius:10px;padding:13px 15px;margin-bottom:10px;
  border:1px solid rgba(255,255,255,.07)}
.card-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;opacity:.4;margin-bottom:8px}

/* Activities */
.act-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.act-item{display:flex;gap:10px;align-items:flex-start}
.act-num{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:800;margin-top:1px}
.act-body{flex:1}
.act-name{font-size:13px;font-weight:600;line-height:1.3}
.act-note{font-size:11px;opacity:.5;margin-top:2px;line-height:1.4}

/* Hotel */
.hotel-text{font-size:12px;line-height:1.7;opacity:.85}

/* Transit */
.transit-text{font-size:12px;line-height:1.7;opacity:.85}
.transit-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:600;background:rgba(255,255,255,.1);margin-bottom:8px}

/* Notes */
.notes-text{font-size:11px;line-height:1.65;opacity:.55;font-style:italic}

/* NAVIGATION */
.nav-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;
  display:flex;align-items:center;gap:10px;background:rgba(10,10,30,.75);
  backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);padding:8px 16px;border-radius:30px}
.nb{background:rgba(255,255,255,.1);border:none;color:#fff;width:34px;height:34px;border-radius:50%;
  cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.15s}
.nb:hover{background:rgba(255,255,255,.25)}
.np{font-size:12px;opacity:.55;min-width:60px;text-align:center}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:.2s}
.dot.on{background:#fff;transform:scale(1.4)}
.dots{display:flex;gap:4px;flex-wrap:wrap;max-width:180px;justify-content:center}
.key-hint{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);font-size:10px;
  opacity:.2;letter-spacing:2px;white-space:nowrap;z-index:9998}

/* Map markers */
.custom-marker{display:flex;align-items:center;justify-content:center;width:28px;height:28px;
  border-radius:50%;border:2.5px solid #fff;font-size:11px;font-weight:800;color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.5)}
.hotel-icon{font-size:14px;background:rgba(0,0,0,.6);border-radius:8px;padding:3px 6px;
  white-space:nowrap;color:#fff;border:1px solid rgba(255,255,255,.3);font-size:11px;font-weight:600}

/* Suggestion & food sections */
.sugg-area{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.45;margin:10px 0 6px}
.sugg-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.sugg-item{display:flex;gap:9px;align-items:flex-start}
.sugg-num{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:800;margin-top:1px}
.food-dot{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:0px}
.sugg-body{flex:1}
.sugg-name{font-size:12px;font-weight:600;color:#fff;text-decoration:none;line-height:1.3;
  border-bottom:1px solid rgba(255,255,255,.15);transition:.15s}
.sugg-name:hover{border-bottom-color:rgba(255,255,255,.6);color:#fff}
.sugg-note{font-size:10px;opacity:.45;margin-top:2px;line-height:1.4}

/* Weather widget */
.wx-loc{font-size:10px;opacity:.45;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.wx-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.wx-cell{background:rgba(255,255,255,.06);border-radius:8px;padding:8px 4px;text-align:center}
.wx-emoji{font-size:14px;margin-bottom:2px}
.wx-val{font-size:12px;font-weight:700;line-height:1.3}
.wx-lbl{font-size:8px;opacity:.4;letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* Route line popup */
.leaflet-popup-content-wrapper{background:rgba(20,20,40,.95);color:#fff;border:1px solid rgba(255,255,255,.15);
  border-radius:8px;backdrop-filter:blur(10px)}
.leaflet-popup-tip{background:rgba(20,20,40,.95)}

/* ── MOBILE / iPHONE ─────────────────────────────────── */
@media (max-width: 768px){
  /* Stack map on top, info scrolls below */
  .day-slide{flex-direction:column}
  .map-pane{width:100%;height:42vw;min-height:190px;max-height:270px;flex-shrink:0}
  .info-pane{
    width:100%;flex:1;min-height:0;
    padding:14px 14px calc(76px + env(safe-area-inset-bottom,16px));
    -webkit-overflow-scrolling:touch;
    touch-action:pan-y;
    overscroll-behavior:contain;
  }

  /* Cover */
  .cover-jp{font-size:40px}
  .cover-en{font-size:11px;letter-spacing:3px}
  .cover-dates{font-size:11px;margin-bottom:20px}
  .cover-route{font-size:11px;gap:4px 3px}
  .start-btn{margin-top:22px;font-size:13px;padding:10px 26px}

  /* Day header */
  .dh-top{margin-bottom:3px}
  .day-badge{font-size:9px;padding:2px 8px}
  .day-num{font-size:10px}
  .dh-date{font-size:16px}
  .dh-loc{font-size:11px;margin-bottom:12px}

  /* Cards */
  .card{padding:10px 12px;margin-bottom:8px;border-radius:9px}
  .card-label{font-size:8px;letter-spacing:1.5px;margin-bottom:6px}

  /* Activities */
  .act-list{gap:7px}
  .act-num{width:20px;height:20px;font-size:9px;flex-shrink:0}
  .act-name{font-size:12px}
  .act-note{font-size:10px}

  /* Hotel / transit */
  .hotel-text,.transit-text{font-size:11px;line-height:1.6}
  .transit-pill{font-size:10px}

  /* Weather — 2×2 grid on small screen */
  .wx-grid{grid-template-columns:repeat(2,1fr);gap:5px}
  .wx-cell{padding:7px 4px}
  .wx-emoji{font-size:13px}
  .wx-val{font-size:12px}
  .wx-lbl{font-size:7px}
  .wx-loc{font-size:9px;margin-bottom:6px}

  /* Suggestions & food — bigger tap targets on links */
  .sugg-area{font-size:9px;margin:8px 0 5px}
  .sugg-list{gap:6px}
  .sugg-num,.food-dot{width:18px;height:18px;font-size:9px}
  .sugg-name{font-size:11px;padding:3px 0;display:inline-block}
  .sugg-note{font-size:9px}

  /* Notes */
  .notes-text{font-size:10px}

  /* Nav bar — 44px tap targets + home-indicator clearance */
  .nav-bar{
    bottom:calc(10px + env(safe-area-inset-bottom,0px));
    padding:7px 14px;gap:10px;
  }
  .nb{width:44px;height:44px;font-size:20px}
  .np{font-size:13px;min-width:50px}
  .dots{display:none}   /* too many dots for small screen */
  .key-hint{display:none}
}

/* Notch / Dynamic Island top padding on cover */
@supports (padding-top:env(safe-area-inset-top)){
  #slide-0{padding-top:env(safe-area-inset-top,0px)}
}
</style>
</head>

// ═══════════════════════════════════════════════════════
//  INIT MAP
// ═══════════════════════════════════════════════════════
function initMap(dayIdx){
  const id = dayIdx+1;
  if(maps[id]) return;
  const d = DAYS[dayIdx];

  const m = L.map(`map-${id}`,{
    center:d.center, zoom:d.zoom,
    zoomControl:true, attributionControl:false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    maxZoom:19, subdomains:'abcd'
  }).addTo(m);

  // Route polyline
  if(d.route&&d.route.length>1){
    const isAir = d.day===1;
    if(isAir){
      // dashed arc for flight
      L.polyline(d.route,{color:d.color,weight:2,dashArray:'8 6',opacity:.7}).addTo(m);
    } else {
      L.polyline(d.route,{color:d.color,weight:3,opacity:.85}).addTo(m);
    }
  }

  // Markers
  d.markers.forEach((mk,mi)=>{
    const isHotel = mk.num==='H'||mk.num==='S'||mk.num==='K'||mk.num==='B'||mk.num==='P';
    const markerColor = isHotel ? '#fff' : d.color;
    const bgColor = isHotel ? d.color : 'rgba(15,15,30,0.9)';
    const icon = L.divIcon({
      className:'',
      html:`<div style="
        background:${bgColor};border:2.5px solid ${markerColor};
        border-radius:50%;width:28px;height:28px;
        display:flex;align-items:center;justify-content:center;
        font-size:10px;font-weight:800;color:${markerColor};
        box-shadow:0 2px 10px rgba(0,0,0,.6);">
        ${mk.num}
      </div>`,
      iconSize:[28,28],iconAnchor:[14,14]
    });
    const labelIcon = L.divIcon({
      className:'',
      html:`<div style="
        background:rgba(10,10,25,0.85);border:1px solid ${d.color}60;
        border-radius:6px;padding:3px 7px;
        font-size:10px;font-weight:600;color:#fff;
        white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.4);
        backdrop-filter:blur(4px);">${mk.lbl}</div>`,
      iconSize:[null,null],iconAnchor:[-16,-5]
    });
    L.marker([mk.lat,mk.lng],{icon}).addTo(m);
    L.marker([mk.lat,mk.lng],{icon:labelIcon,interactive:false}).addTo(m);
  });

  // ── Suggestion markers (smaller, dashed border, numbered per-area)
  if(d.suggestions){
    d.suggestions.forEach(area=>{
      const ac = area.acolor || d.color;
      area.items.forEach((item,si)=>{
        const icon = L.divIcon({className:'',
          html:`<div style="background:rgba(10,10,25,.9);border:2px dashed ${ac};border-radius:50%;
            width:20px;height:20px;display:flex;align-items:center;justify-content:center;
            font-size:9px;font-weight:800;color:${ac};box-shadow:0 2px 8px rgba(0,0,0,.6);">${si+1}</div>`,
          iconSize:[20,20],iconAnchor:[10,10]});
        const lbl = L.divIcon({className:'',
          html:`<div style="background:rgba(10,10,25,.82);border:1px dashed ${ac}60;border-radius:5px;
            padding:2px 6px;font-size:9px;font-weight:600;color:${ac};white-space:nowrap;">${item.n}</div>`,
          iconSize:[null,null],iconAnchor:[-14,-4]});
        L.marker([item.lat,item.lng],{icon}).addTo(m);
        L.marker([item.lat,item.lng],{icon:lbl,interactive:false}).addTo(m);
      });
    });
  }

  // ── Food markers (small green circles with 🌱)
  if(d.food){
    d.food.forEach(area=>{
      area.items.forEach(item=>{
        const icon = L.divIcon({className:'',
          html:`<div style="background:rgba(39,174,96,.18);border:2px solid #27AE60;border-radius:50%;
            width:20px;height:20px;display:flex;align-items:center;justify-content:center;
            font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,.6);">🌱</div>`,
          iconSize:[20,20],iconAnchor:[10,10]});
        const lbl = L.divIcon({className:'',
          html:`<div style="background:rgba(10,10,25,.82);border:1px solid rgba(39,174,96,.4);border-radius:5px;
            padding:2px 6px;font-size:9px;font-weight:600;color:#66BB6A;white-space:nowrap;">${item.n}</div>`,
          iconSize:[null,null],iconAnchor:[-14,-4]});
        L.marker([item.lat,item.lng],{icon}).addTo(m);
        L.marker([item.lat,item.lng],{icon:lbl,interactive:false}).addTo(m);
      });
    });
  }

  maps[id] = m;
}

// ═══════════════════════════════════════════════════════
//  COVER MAP
// ═══════════════════════════════════════════════════════
function initCoverMap(){
  const cm = L.map('cover-map',{
    center:[32,135],zoom:4,
    zoomControl:false,attributionControl:false,
    interactive:false
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    maxZoom:10,subdomains:'abcd'
  }).addTo(cm);
  // Route overview
  const pts=[[37.6,-122.4],[25.08,121.23],[35.68,139.70],[34.99,135.76],[34.99,135.76],[37.52,126.98],[37.62,-122.38]];
  const cols=['#FF6B9D','#E53935','#E53935','#27AE60','#E67E22','#3498DB'];
  for(let i=0;i<pts.length-1;i++){
    L.polyline([pts[i],pts[i+1]],{color:cols[i]||'#fff',weight:1.5,dashArray:'5 5',opacity:.6}).addTo(cm);
  }
  const cities=[
    {c:[37.6,-122.4],lbl:'SFO',col:'#7F8C8D'},
    {c:[25.08,121.23],lbl:'TPE',col:'#FF6B9D'},
    {c:[35.68,139.70],lbl:'TYO',col:'#E53935'},
    {c:[35.00,135.76],lbl:'KYO',col:'#27AE60'},
    {c:[34.69,135.52],lbl:'OSA',col:'#E67E22'},
    {c:[37.52,126.98],lbl:'ICN',col:'#3498DB'}
  ];
  cities.forEach(cy=>{
    const ic=L.divIcon({className:'',html:`<div style="background:${cy.col};border:2px solid #fff;border-radius:50%;width:10px;height:10px;box-shadow:0 0 6px ${cy.col}80"></div>`,iconSize:[10,10],iconAnchor:[5,5]});
    L.marker(cy.c,{icon:ic}).addTo(cm);
  });
}

// ═══════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════
function buildDots(){
  const dots=document.getElementById('dots');
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'');
    d.onclick=()=>goTo(i);
    dots.appendChild(d);
  }
}

function updateDots(){
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('on',i===current);
  });
  document.getElementById('prog').textContent=`${current+1} / ${total}`;
}

function goTo(idx){
  document.getElementById(`slide-${current}`).classList.remove('active');
  current=idx;
  document.getElementById(`slide-${current}`).classList.add('active');
  updateDots();
  if(current>0){
    initMap(current-1);
    // Fix map size after show
    setTimeout(()=>{
      const m=maps[current];
      if(m){m.invalidateSize();m.setView(DAYS[current-1].center,DAYS[current-1].zoom);}
    },60);
  }
}

function next(){if(current<total-1)goTo(current+1);}
function prev(){if(current>0)goTo(current-1);}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ')next();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')prev();
});

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
buildSlides();
buildDots();
initCoverMap();

// Cherry blossom petals on cover
function petal(){
  if(current!==0)return;
  const p=document.createElement('div');
  p.className='petal';
  p.textContent=['🌸','🌺','🌼','🌷'][Math.floor(Math.random()*4)];
  p.style.left=Math.random()*100+'vw';
  p.style.animationDuration=(4+Math.random()*4)+'s';
  p.style.fontSize=(12+Math.random()*10)+'px';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),8000);
}
setInterval(petal,600);
petal(); petal(); petal();

// ── SWIPE GESTURES (touch devices) ───────────────────
// Swiping on the info panel changes slides.
// Touches that start on the map are passed to Leaflet unchanged.
let _tx=0, _ty=0, _onMap=false;
document.addEventListener('touchstart',e=>{
  _tx=e.touches[0].clientX;
  _ty=e.touches[0].clientY;
  _onMap=!!e.target.closest('.map-pane');
},{passive:true});
document.addEventListener('touchend',e=>{
  if(_onMap)return;
  const dx=e.changedTouches[0].clientX-_tx;
  const dy=e.changedTouches[0].clientY-_ty;
  // Horizontal swipe: dx dominant and > 55px
  if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.5){
    dx<0?next():prev();
  }
},{passive:true});
</script>
